name: 'Claude Code'

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    uses: 'rios0rios0/.github/.github/workflows/claude.yaml@main'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    permissions:
      contents: 'write'
      pull-requests: 'write'
      issues: 'write'
      id-token: 'write'
      actions: 'read'
